                            type === PACKET_TYPE.SCREEN_VIDEO ||
                            type === PACKET_TYPE.WEBCAM_VIDEO
                        ) {
                            const media = getOrInitRemoteMedia(peerId, type);
                            media.lastActivity = performance.now();

                            const frameId = decryptedView.getUint16(9, true);
                            const chunkIndex = decryptedView.getUint16(
                                11,
                                true,
                            );
                            const totalChunks = decryptedView.getUint16(
                                13,
                                true,
                            );

                            if (
                                media.highestFid === undefined ||
                                getSeqDiff(frameId, media.highestFid) > 0
                            )
                                media.highestFid = frameId;

                            if (media.pending.size > 20) {
                                for (const key of media.pending.keys()) {
                                    if (getSeqDiff(media.highestFid, key) > 30)
                                        media.pending.delete(key);
                                }
                            }

                            let entry = media.pending.get(frameId);
                            if (!entry) {
                                entry = {
                                    chunks: new Array(totalChunks),
                                    got: 0,
                                    ts: 0,
                                    isKey: false,
                                };
                                media.pending.set(frameId, entry);
                            }

                            if (chunkIndex === 0) {
                                entry.isKey = decryptedData[15] === 1;
                                entry.ts = Number(
                                    decryptedView.getBigInt64(16, true),
                                );
                                entry.chunks[0] = decryptedData.subarray(24);
                            } else {
                                entry.chunks[chunkIndex] =
                                    decryptedData.subarray(15);
                            }
                            entry.got++;

                            if (entry.got === totalChunks) {
                                media.pending.delete(frameId);

                                if (
                                    !entry.isKey &&
                                    frameId !== (media.lastDecId + 1) % 65535
                                ) {
                                    const now = performance.now();
                                    if (now - media.lastReqTime > 1000) {
                                        media.lastReqTime = now;
                                        requestKeyframe(peerId, type);
                                    }
                                    continue;
                                }

                                const length = entry.chunks.reduce(
                                    (acc, c) => acc + c.byteLength,
                                    0,
                                );
                                const fullData = new Uint8Array(length);
                                let offset = 0;
                                for (const c of entry.chunks) {
                                    fullData.set(c, offset);
                                    offset += c.byteLength;
                                }

                                let finalVideoData = fullData;

                                if (entry.isKey) {
                                    const configId = fullData[0];
                                    const descriptionLength = new DataView(
                                        fullData.buffer,
                                        fullData.byteOffset,
                                        fullData.byteLength,
                                    ).getUint16(1, true);
                                    const descriptionData =
                                        descriptionLength > 0
                                            ? fullData.subarray(
                                                  3,
                                                  3 + descriptionLength,
                                              )
                                            : undefined;

                                    finalVideoData = fullData.subarray(
                                        3 + descriptionLength,
                                    );
                                    const codecString = CODECS[configId];

                                    if (codecString) {
                                        const decoderConfig = {
                                            codec: codecString,
                                            optimizeForLatency: true,
                                        };
                                        if (descriptionData)
                                            decoderConfig.description =
                                                descriptionData;

                                        if (
                                            media.isVideoConfigured &&
                                            media.decoder.state !== "closed"
                                        )
                                            media.decoder.reset();
                                        media.decoder.configure(decoderConfig);
                                        media.isVideoConfigured = true;
                                    }
                                }

                                if (media.baseTs === null)
                                    media.baseTs = entry.ts;
                                media.currentVideoTs = entry.ts - media.baseTs;

                                if (
                                    media.isVideoConfigured &&
                                    media.decoder.state === "configured"
                                ) {
                                    try {
                                        media.decoder.decode(
                                            new EncodedVideoChunk({
                                                type: entry.isKey
                                                    ? "key"
                                                    : "delta",
                                                timestamp: Math.max(
                                                    0,
                                                    media.currentVideoTs,
                                                ),
                                                data: finalVideoData,
                                            }),
                                        );
                                        media.lastDecId = frameId;
                                    } catch (error) {
                                        console.log(error);
                                        media.isVideoConfigured = false;
                                        requestKeyframe(peerId, type);
                                    }
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.log(error);
                }
            }

            setInterval(() => {
                const now = performance.now();
                for (const [peerId, peer] of remotePeers.entries()) {
                    for (const type of Object.values(PACKET_TYPE)) {
                        const mediaObj = peer.media[type];
                        if (mediaObj && now - mediaObj.lastActivity > 3000) {
                            if (
                                mediaObj.decoder &&
                                mediaObj.decoder.state !== "closed"
                            ) {
                                try {
                                    mediaObj.decoder.close();
                                } catch {}
                            }
                            delete peer.media[type];
                        }
                    }

                    const cleanupGroup = (key, streamTypes) => {
                        if (!streamTypes.some((type) => peer.media[type])) {
                            if (peer.audioNodes[key]) {
                                try {
                                    peer.audioNodes[key].disconnect();
                                } catch (error) {
                                    console.log(
                                        "Audio node disconnect error:",
                                        error,
                                    );
                                }
                                delete peer.audioNodes[key];
                            }

                            if (peer.elements[key]) {
                                peer.elements[key].remove();
                                delete peer.elements[key];
                            }

                            if (peer.streams[key]) {
                                peer.streams[key].getTracks().forEach((t) => {
                                    try {
                                        t.stop();
                                    } catch {}
                                });
                                peer.streams[key] = new MediaStream();
                            }

                            const writerKey = `${key}Vid`;
                            if (peer.writers[writerKey]) {
                                const writerObj = peer.writers[writerKey];
                                if (writerObj.worker) {
                                    try {
                                        writerObj.worker.terminate();
                                    } catch {}
                                }
                                delete peer.writers[writerKey];
                            }
                        }
                    };

                    cleanupGroup("screen", [
                        PACKET_TYPE.SCREEN_VIDEO,
                        PACKET_TYPE.SCREEN_AUDIO,
                    ]);
                    cleanupGroup("webcam", [PACKET_TYPE.WEBCAM_VIDEO]);
                    cleanupGroup("mic", [PACKET_TYPE.MICROPHONE]);

                    if (Object.keys(peer.media).length === 0) {
                        remotePeers.delete(peerId);
                    }
                }
            }, 1000);
        </script>
    </body>
</html>
